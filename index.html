<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clip Manager</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: auto; padding: 20px; }
    input, button { padding: 8px; margin: 5px 0; }
    .clip { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
  </style>
</head>
<body>

<div id="auth">
  <h2>Login / Register</h2>
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<div id="app" style="display:none">
  <h2>Clip Manager</h2>
  <p id="userLabel"></p>
  <button onclick="logout()">Logout</button>

  <h3>Add clip</h3>
  <input id="title" placeholder="Title"><br>
  <input id="url" placeholder="Video URL"><br>
  <button onclick="addClip()">Add</button>

  <div id="clips"></div>
</div>

<script>
let user = null;
let clips = JSON.parse(localStorage.getItem('clips')) || [];

function saveClips() {
  localStorage.setItem('clips', JSON.stringify(clips));
}

function register() {
  const u = username.value;
  const p = password.value;
  if (!u || !p) return;
  localStorage.setItem('user_' + u, JSON.stringify({u, p}));
  user = {u};
  localStorage.setItem('currentUser', JSON.stringify(user));
  initApp();
}

function login() {
  const u = username.value;
  const p = password.value;
  const data = JSON.parse(localStorage.getItem('user_' + u));
  if (!data || data.p !== p) return alert('Wrong data');
  user = {u};
  localStorage.setItem('currentUser', JSON.stringify(user));
  initApp();
}

function logout() {
  localStorage.removeItem('currentUser');
  location.reload();
}

function addClip() {
  const t = title.value;
  const u = url.value;
  if (!t || !u) return;
  clips.push({id: Date.now(), title: t, url: u, rating: 0, user: user.u});
  saveClips();
  render();
}

function rate(id, val) {
  clips = clips.map(c => c.id === id ? {...c, rating: val} : c);
  saveClips();
  render();
}

function render() {
  clipsDiv.innerHTML = '';
  clips.forEach(c => {
    const div = document.createElement('div');
    div.className = 'clip';
    div.innerHTML = `
      <b>${c.title}</b> (by ${c.user})<br>
      <video src="${c.url}" controls width="100%"></video><br>
      Rating: ${c.rating}<br>
      ${[1,2,3,4,5].map(n => `<button onclick="rate(${c.id}, ${n})">${n}</button>`).join('')}
    `;
    clipsDiv.appendChild(div);
  });
}

function initApp() {
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  userLabel.innerText = 'Logged as: ' + user.u;
  render();
}

// Auto login
const saved = localStorage.getItem('currentUser');
if (saved) {
  user = JSON.parse(saved);
  initApp();
}
</script>

</body>
</html>
