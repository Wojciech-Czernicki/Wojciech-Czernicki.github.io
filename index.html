<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clip Manager PRO</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: system-ui; background:#0f172a; color:white; margin:0; }
    .container { max-width:900px; margin:auto; padding:20px; }
    input { width:100%; padding:10px; margin:5px 0; border-radius:10px; border:none; background:#1e293b; color:white; }
    button { padding:10px; border:none; border-radius:10px; background:#3b82f6; color:white; cursor:pointer; }
    .card { background:#1e293b; padding:15px; border-radius:15px; margin-top:10px; }
    video { width:100%; border-radius:10px; }
  </style>
</head>
<body>
<div class="container">

<div id="auth">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">
  <h1>🎬 Clip Manager PRO</h1>
  <button onclick="logout()">Logout</button>

  <h3>Add clip</h3>
  <input id="title" placeholder="Title">
  <input id="url" placeholder="Video URL">
  <button onclick="addClip()">Add</button>

  <h3>Top clips</h3>
  <div id="clips"></div>
</div>

</div>

<script>
// 🔥 WSTAW SWOJE DANE Z FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let clips = [];

// AUTH
function register(){
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .catch(e=>alert(e.message));
}

function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(e=>alert(e.message));
}

function logout(){ auth.signOut(); }

// AUTO LOGIN
auth.onAuthStateChanged(user=>{
  if(user){
    authDiv.style.display='none';
    app.style.display='block';
    loadClips();
  } else {
    authDiv.style.display='block';
    app.style.display='none';
  }
});

// ADD CLIP
function addClip(){
  db.collection('clips').add({
    title: title.value,
    url: url.value,
    rating: 0,
    likes: 0,
    user: auth.currentUser.email,
    created: Date.now()
  });
}

// LOAD CLIPS
function loadClips(){
  db.collection('clips').orderBy('created','desc')
    .onSnapshot(snap=>{
      clips = snap.docs.map(d=>({id:d.id,...d.data()}));
      render();
    });
}

// LIKE
function like(id, val){
  const clip = clips.find(c=>c.id===id);
  db.collection('clips').doc(id).update({likes: clip.likes + val});
}

// RENDER
function render(){
  clipsDiv.innerHTML='';

  clips.sort((a,b)=>b.likes-a.likes);

  clips.forEach(c=>{
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`
      <h3>${c.title}</h3>
      <small>${c.user}</small>
      <video src="${c.url}" controls></video>
      <p>👍 ${c.likes}</p>
      <button onclick="like('${c.id}',1)">Like</button>
    `;
    clipsDiv.appendChild(div);
  });
}
</script>

</body>
</html>
