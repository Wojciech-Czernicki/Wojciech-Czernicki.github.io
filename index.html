<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clip Manager</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1, h2, h3 { margin: 10px 0; }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
      background: #1e293b;
      color: white;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover { background: #2563eb; }

    .secondary {
      background: #334155;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 16px;
      margin-top: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row button { flex: 1; }

    video {
      width: 100%;
      border-radius: 12px;
      margin: 10px 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .badge {
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div class="container">

  <div id="auth">
    <h2>Login / Register</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <div class="row">
      <button onclick="login()">Login</button>
      <button class="secondary" onclick="register()">Register</button>
    </div>
  </div>

  <div id="app" style="display:none">

    <div class="topbar">
      <h1>🎬 Clip Manager</h1>
      <div>
        <span id="userLabel" class="badge"></span>
        <button class="secondary" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="card">
      <h3>Add clip</h3>
      <input id="title" placeholder="Title">
      <input id="url" placeholder="Video URL">
      <button onclick="addClip()">Add clip</button>
    </div>

    <div id="clips"></div>

  </div>

</div>

<script>
let user = null;
let clips = JSON.parse(localStorage.getItem('clips')) || [];

function saveClips() {
  localStorage.setItem('clips', JSON.stringify(clips));
}

function register() {
  const u = username.value;
  const p = password.value;
  if (!u || !p) return;
  localStorage.setItem('user_' + u, JSON.stringify({u, p}));
  user = {u};
  localStorage.setItem('currentUser', JSON.stringify(user));
  initApp();
}

function login() {
  const u = username.value;
  const p = password.value;
  const data = JSON.parse(localStorage.getItem('user_' + u));
  if (!data || data.p !== p) return alert('Wrong data');
  user = {u};
  localStorage.setItem('currentUser', JSON.stringify(user));
  initApp();
}

function logout() {
  localStorage.removeItem('currentUser');
  location.reload();
}

function addClip() {
  const t = title.value;
  const u = url.value;
  if (!t || !u) return;
  clips.push({id: Date.now(), title: t, url: u, rating: 0, user: user.u});
  saveClips();
  render();
}

function rate(id, val) {
  clips = clips.map(c => c.id === id ? {...c, rating: val} : c);
  saveClips();
  render();
}

function render() {
  clipsDiv.innerHTML = '';
  clips.slice().reverse().forEach(c => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <h3>${c.title}</h3>
      <div class="badge">by ${c.user}</div>
      <video src="${c.url}" controls></video>
      <div class="row">
        ${[1,2,3,4,5].map(n => `<button onclick="rate(${c.id}, ${n})">⭐ ${n}</button>`).join('')}
      </div>
      <div class="badge">Rating: ${c.rating}</div>
    `;
    clipsDiv.appendChild(div);
  });
}

function initApp() {
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  userLabel.innerText = user.u;
  render();
}

const saved = localStorage.getItem('currentUser');
if (saved) {
  user = JSON.parse(saved);
  initApp();
}
</script>

</body>
</html>
