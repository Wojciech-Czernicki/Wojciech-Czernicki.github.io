<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gra - Kategorie</title>
    <style>
        body {
            background: radial-gradient(circle at center, #000000 41%, #ff0000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
        }
        h1 {
            color: white;
            margin-bottom: 20px;
        }
        .kategoria {
            text-align: center;
            margin-bottom: 50px;
        }
        .obrazek {
            width: 200px;
            height: auto;
            margin-bottom: 10px;
            cursor: pointer;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #005F73;
        }
    </style>
</head>
<body>
    <h1>Wybierz kategorię</h1>
    <div class="kategoria" onclick="rozpocznijGre('kategoria1')">
        <img class="obrazek" src="Obrazy_Wizualne/Zycie.jpg" alt="Random">
        <p>Random</p>
        <button>Wybierz</button>
    </div>
    <div class="kategoria" onclick="rozpocznijGre('kategoria2')">
        <img class="obrazek" src="Obrazy_Wizualne/Zycie.jpg" alt="CS2">
        <p>CS2</p>
        <button>Wybierz</button>
    </div>
    <div class="kategoria" onclick="rozpocznijGre('kategoria3')">
        <img class="obrazek" src="phasmophobia_obrazek.jpg" alt="Phasmophobia">
        <p>Phasmophobia</p>
        <button>Wybierz</button>
    </div>
    <div class="kategoria" onclick="rozpocznijGre('kategoria4')">
        <img class="obrazek" src="pusty_obrazek.jpg" alt="Pusty">
        <p>Kategoria 4 - Pusty</p>
        <button>Wybierz</button>
    </div>

    <script src="skrypt.js"></script>
    <script>
        function rozpocznijGre(kategoria) {
            // Ustaw lokalne skladowanie, aby oznaczyc, ze gra zostala rozpoczeta
            localStorage.setItem("graRozpoczeta", "true");

            // Przekieruj użytkownika do odpowiedniego trybu gry dla wybranej kategorii
            window.location.href = kategoria + '.html';
        }
    </script>
</body>
</html>
